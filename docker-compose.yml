services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis

  worker:
    build:
      context: ./backend
    command: celery -A workers.celery_app worker -l info
    volumes:
      - ./backend:/app
      - ./workers:/app/workers
    env_file:
      - .env
    depends_on:
      - redis

  ai-service:
    build:
      context: ./ai-service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./ai-service:/app
    ports:
      - "8001:8001"
    env_file:
      - .env

  # ─── Postgres local (alternativa ao Supabase em dev) ──────────────
  # Descomente e ajuste DATABASE_URL no .env para usar um banco local
  # com PostGIS + pgvector já disponíveis para as próximas fases.
  #
  # postgres:
  #   image: postgis/postgis:16-3.4
  #   environment:
  #     POSTGRES_DB: ecclesia
  #     POSTGRES_USER: ecclesia
  #     POSTGRES_PASSWORD: ecclesia
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - pg_data:/var/lib/postgresql/data

volumes:
  redis_data:
